<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個股深度分析 | 台股 AI 分析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Noto Sans TC', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-50">
    <!-- 導航列 -->
    <nav class="gradient-bg text-white sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="bg-white/20 p-2 rounded-lg"><span class="text-2xl">📈</span></div>
                    <div><h1 class="text-2xl font-bold">台股 AI 分析</h1></div>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/" class="px-4 py-2 hover:bg-white/20 rounded-lg">首頁</a>
                    <a href="/stock.html" class="px-4 py-2 bg-white/20 rounded-lg">個股分析</a>
                    <a href="/screener.html" class="px-4 py-2 hover:bg-white/20 rounded-lg">AI選股</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <!-- 搜尋區 -->
        <div class="bg-white rounded-2xl p-6 shadow-lg mb-8">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-1 relative">
                    <input type="text" id="stockInput" placeholder="輸入股票代號 (如: 2330)" 
                           class="w-full px-6 py-4 bg-gray-100 rounded-xl border-2 border-transparent focus:border-indigo-500 focus:bg-white transition text-lg"
                           value="">
                </div>
                <button onclick="searchStock()" 
                        class="px-8 py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-bold text-lg hover:shadow-lg transition">
                    分析
                </button>
            </div>
        </div>

        <!-- 股票標題 -->
        <div class="bg-white rounded-2xl p-6 shadow-lg mb-6">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <h2 id="stock-name" class="text-3xl font-bold text-gray-800">請輸入股票代號</h2>
                    <p id="stock-symbol" class="text-gray-500">-</p>
                </div>
                <div class="text-right">
                    <div id="stock-price" class="text-4xl font-bold text-gray-800">-</div>
                    <div id="stock-change" class="text-lg">-</div>
                </div>
            </div>
        </div>

        <!-- 四面向分析卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <!-- 技術面 -->
            <div id="technical-analysis" class="bg-white rounded-2xl p-6 shadow-lg border-l-4 border-gray-300">
                <div class="flex items-center justify-between mb-2">
                    <h4 class="font-bold text-gray-800">技術面</h4>
                    <span class="px-2 py-1 bg-gray-100 text-gray-600 rounded text-sm">等待分析</span>
                </div>
                <div class="text-sm text-gray-500">點擊上方分析按鈕開始</div>
            </div>

            <!-- 基本面 -->
            <div id="fundamental-analysis" class="bg-white rounded-2xl p-6 shadow-lg border-l-4 border-gray-300">
                <div class="flex items-center justify-between mb-2">
                    <h4 class="font-bold text-gray-800">基本面</h4>
                    <span class="px-2 py-1 bg-gray-100 text-gray-600 rounded text-sm">等待分析</span>
                </div>
                <div class="text-sm text-gray-500">點擊上方分析按鈕開始</div>
            </div>

            <!-- 籌碼面 -->
            <div id="chip-analysis" class="bg-white rounded-2xl p-6 shadow-lg border-l-4 border-gray-300">
                <div class="flex items-center justify-between mb-2">
                    <h4 class="font-bold text-gray-800">籌碼面</h4>
                    <span class="px-2 py-1 bg-gray-100 text-gray-600 rounded text-sm">等待分析</span>
                </div>
                <div class="text-sm text-gray-500">點擊上方分析按鈕開始</div>
            </div>

            <!-- 新聞面 -->
            <div id="news-analysis" class="bg-white rounded-2xl p-6 shadow-lg border-l-4 border-gray-300">
                <div class="flex items-center justify-between mb-2">
                    <h4 class="font-bold text-gray-800">新聞面</h4>
                    <span class="px-2 py-1 bg-gray-100 text-gray-600 rounded text-sm">等待分析</span>
                </div>
                <div class="text-sm text-gray-500">點擊上方分析按鈕開始</div>
            </div>
        </div>

        <!-- 綜合建議 -->
        <div class="recommendation-section bg-gradient-to-r from-indigo-500 to-purple-600 rounded-2xl p-6 text-white mb-8">
            <h3 class="text-xl font-bold mb-4">💡 綜合分析與交易建議</h3>
            <div class="bg-white/10 rounded-xl p-4">
                <p class="text-lg">輸入股票代號後，AI 將進行四面向分析並提供交易建議</p>
            </div>
        </div>

        <!-- 詳細評語 -->
        <div class="bg-white rounded-2xl p-6 shadow-lg">
            <h3 class="text-lg font-bold text-gray-800 mb-4">📝 分析詳情</h3>
            <div id="detail-analysis" class="prose max-w-none text-gray-600">
                <p>等待分析結果...請輸入股票代號並點擊分析按�</p>
            </div>
        </div>
    </main>

    <footer class="bg-gray-800 text-white py-8 mt-12">
        <div class="container mx-auto px-4 text-center">
            <p class="text-gray-400">© 2024 台股 AI 分析網 | 資料僅供參考，投資需謹慎</p>
        </div>
    </footer>

    <script src="/js/api.js"></script>
</body>
</html>
