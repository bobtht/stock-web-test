<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股 AI 分析網</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Noto Sans TC', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .glass { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 導航列 -->
    <nav class="gradient-bg text-white sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="bg-white/20 p-2 rounded-lg">
                        <span class="text-2xl">📈</span>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold">台股 AI 分析</h1>
                        <p class="text-sm text-white/80">Taiwan Stock Intelligence</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/" class="px-4 py-2 bg-white/20 rounded-lg">首頁</a>
                    <a href="/stock.html" class="px-4 py-2 hover:bg-white/20 rounded-lg">個股分析</a>
                    <a href="/screener.html" class="px-4 py-2 hover:bg-white/20 rounded-lg">AI選股</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主要內容 -->
    <main class="container mx-auto px-4 py-8">
        <!-- 搜尋區 -->
        <div class="bg-white rounded-2xl p-6 shadow-lg mb-8">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-1 relative">
                    <input type="text" id="stockInput" placeholder="輸入股票代號 (如: 2330)" 
                           class="w-full px-6 py-4 bg-gray-100 rounded-xl border-2 border-transparent focus:border-indigo-500 focus:bg-white transition text-lg">
                </div>
                <button onclick="searchStock()" 
                        class="px-8 py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-bold text-lg hover:shadow-lg transition">
                    查詢
                </button>
            </div>
        </div>

        <!-- 大盤概況 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-2xl p-6 shadow-lg">
                <h3 class="text-gray-600 font-medium mb-2">加權指數</h3>
                <div class="text-4xl font-bold text-gray-800" id="taiex">--</div>
                <div class="text-gray-500 mt-2" id="taiex-change">--</div>
            </div>
            <div class="bg-white rounded-2xl p-6 shadow-lg">
                <h3 class="text-gray-600 font-medium mb-2">櫃買指數</h3>
                <div class="text-4xl font-bold text-gray-800" id="otc">--</div>
                <div class="text-gray-500 mt-2" id="otc-change">--</div>
            </div>
            <div class="bg-white rounded-2xl p-6 shadow-lg">
                <h3 class="text-gray-600 font-medium mb-2">強勢股數</h3>
                <div class="text-4xl font-bold text-green-600" id="strong-count">--</div>
                <div class="text-gray-500 mt-2">今日篩選</div>
            </div>
        </div>

        <!-- 熱門股票 -->
        <div class="bg-white rounded-2xl p-6 shadow-lg">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">🔥 熱門股票</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4" id="hot-stocks">
                <!-- 動態生成 -->
            </div>
        </div>
    </main>

    <footer class="bg-gray-800 text-white py-8 mt-12">
        <div class="container mx-auto px-4 text-center">
            <p class="text-gray-400">© 2024 台股 AI 分析網</p>
            <p class="text-gray-500 text-sm mt-2">資料僅供參考，投資需謹慎</p>
        </div>
    </footer>

    <script src="/js/app.js"></script>
</body>
</html>
